services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: auto_forge
      POSTGRES_USER: auto_forge
      POSTGRES_PASSWORD: auto_forge
    volumes:
      - auto_forge_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto_forge -d auto_forge"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: npm run start:api
    env_file:
      - path: ${AUTO_FORGE_RUNTIME_ENV_FILE:-.env}
        required: false
    environment:
      DATABASE_URL: postgres://auto_forge:auto_forge@postgres:5432/auto_forge
      AUTO_FORGE_RUNTIME_CONTEXT: container
      AUTO_FORGE_API_HEALTH_URL: http://127.0.0.1:3000/live
      AUTO_FORGE_WEB_HEALTH_URL: http://web:5173/
      AUTO_FORGE_DATA_DIR: /data
      AUTO_FORGE_SETUP_PATH: ${AUTO_FORGE_COMPOSE_SETUP_PATH:-/data/setup.json}
      AUTO_FORGE_LOG_DIR: /data/logs
      AUTO_FORGE_BACKUP_DIR: /data/backups
      AUTO_FORGE_WORKER_HEALTH_PATH: /data/worker-health.json
      AUTO_FORGE_ARTIFACT_ROOT: /data/artifacts
      AUTO_FORGE_PROMPT_ROOT: /data/prompts
      AUTO_FORGE_CODEX_AUTH_SOURCE_DIR: /codex-auth-source
      AUTO_FORGE_CODEX_SANDBOX: ${AUTO_FORGE_CODEX_SANDBOX:-danger-full-access}
      CODEX_HOME: /data/codex-home
    ports:
      - "${AUTO_FORGE_API_PORT:-3000}:3000"
    volumes:
      - ${AUTO_FORGE_HOST_DATA_DIR:-.auto-forge/compose-data}:/data
      - ${AUTO_FORGE_CODEX_AUTH_SOURCE_DIR:-/root/.codex}:/codex-auth-source:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    build: .
    command: npm run start:worker
    env_file:
      - path: ${AUTO_FORGE_RUNTIME_ENV_FILE:-.env}
        required: false
    environment:
      DATABASE_URL: postgres://auto_forge:auto_forge@postgres:5432/auto_forge
      AUTO_FORGE_RUNTIME_CONTEXT: container
      AUTO_FORGE_API_HEALTH_URL: http://api:3000/live
      AUTO_FORGE_WEB_HEALTH_URL: http://web:5173/
      AUTO_FORGE_DATA_DIR: /data
      AUTO_FORGE_SETUP_PATH: ${AUTO_FORGE_COMPOSE_SETUP_PATH:-/data/setup.json}
      AUTO_FORGE_LOG_DIR: /data/logs
      AUTO_FORGE_BACKUP_DIR: /data/backups
      AUTO_FORGE_WORKER_HEALTH_PATH: /data/worker-health.json
      AUTO_FORGE_ARTIFACT_ROOT: /data/artifacts
      AUTO_FORGE_PROMPT_ROOT: /data/prompts
      AUTO_FORGE_CODEX_AUTH_SOURCE_DIR: /codex-auth-source
      AUTO_FORGE_CODEX_SANDBOX: ${AUTO_FORGE_CODEX_SANDBOX:-danger-full-access}
      CODEX_HOME: /data/codex-home
    volumes:
      - ${AUTO_FORGE_HOST_DATA_DIR:-.auto-forge/compose-data}:/data
      - ${AUTO_FORGE_CODEX_AUTH_SOURCE_DIR:-/root/.codex}:/codex-auth-source:ro
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: .
    command: npm run start:web -- --host 0.0.0.0 --port 5173
    env_file:
      - path: ${AUTO_FORGE_RUNTIME_ENV_FILE:-.env}
        required: false
    environment:
      AUTO_FORGE_ALLOW_ALL_WEB_HOSTS: "1"
      __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS: "web,${AUTO_FORGE_WEB_ALLOWED_HOSTS:-}"
    ports:
      - "${AUTO_FORGE_WEB_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy

  smoke:
    build: .
    command: npm run ops:health
    env_file:
      - path: ${AUTO_FORGE_RUNTIME_ENV_FILE:-.env}
        required: false
    environment:
      DATABASE_URL: postgres://auto_forge:auto_forge@postgres:5432/auto_forge
      AUTO_FORGE_RUNTIME_CONTEXT: container
      AUTO_FORGE_API_HEALTH_URL: http://api:3000/live
      AUTO_FORGE_WEB_HEALTH_URL: http://web:5173/
      AUTO_FORGE_DATA_DIR: /data
      AUTO_FORGE_SETUP_PATH: ${AUTO_FORGE_COMPOSE_SETUP_PATH:-/data/setup.json}
      AUTO_FORGE_LOG_DIR: /data/logs
      AUTO_FORGE_BACKUP_DIR: /data/backups
      AUTO_FORGE_WORKER_HEALTH_PATH: /data/worker-health.json
      AUTO_FORGE_ARTIFACT_ROOT: /data/artifacts
      AUTO_FORGE_PROMPT_ROOT: /data/prompts
      AUTO_FORGE_CODEX_AUTH_SOURCE_DIR: /codex-auth-source
      AUTO_FORGE_CODEX_SANDBOX: ${AUTO_FORGE_CODEX_SANDBOX:-danger-full-access}
      CODEX_HOME: /data/codex-home
    volumes:
      - ${AUTO_FORGE_HOST_DATA_DIR:-.auto-forge/compose-data}:/data
      - ${AUTO_FORGE_CODEX_AUTH_SOURCE_DIR:-/root/.codex}:/codex-auth-source:ro
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  auto_forge_postgres:
