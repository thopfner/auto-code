interface:
  display_name: "FORGE QA Brief"
  short_description: "Memory-aware remote QA and strict VPS runbooks"
  default_prompt: >-
    Use $forge-qa-brief to SSH into the server, perform QA, and rehydrate from the lightest truthful context. Treat the active VPS repo path as the only allowed filesystem root: if I ask for a new branch or worktree, interpret that as a GitHub branch request only, do not create `git worktree` directories or duplicate repo folders, and keep all QA artifacts inside the active repo path. Re-read the full repo memory only on a fresh QA session or when branch, active repo target, active brief, brief lineage, topology, or durable constraints changed materially; otherwise use the active brief, the reviewed phase file(s), reports/LATEST.md, reports/LATEST.json when present, automation/state.json and automation/qa.json when present, and only the implicated repo-memory docs as your QA delta context. Reuse prior green worker evidence when there is no relevant code or runtime delta since the last green stop, and rerun independently only at final shipgate, after high-risk deltas, or when worker evidence is missing, stale, or untrustworthy. Classify each blocking finding as plan_gap, execution_miss, or validation_only, say whether the current phase brief already made the missed behavior explicit, and route the next action accordingly. Preserve the source brief's Production-grade acceptance bar in every revision pack unless I explicitly approved a lower temporary bar; for replans, re-establish that bar from repo conventions, source scope or plan lineage, external primary-source research, or an explicit user-approved tradeoff. Validation levels must be truthful because repo-local Claude hooks may deny Bash commands that exceed the declared phase contract, and V3A repos may also enforce owned_paths and execution status from automation/state.json. In LIVE_RELOAD, do not require or perform rebuilds unless the running service is stale or a real runtime boundary changed. In SERVICE_RESTART, accept service-scoped docker compose build, up --build, or recreate evidence when the phase explicitly named that command family for the directly affected service and no broader stack rebuild was required. If the repo uses machine-readable stop artifacts, verify that reports/LATEST.json points at the same newest stop report as reports/LATEST.md and keeps implementation_commit_sha and stop_report_commit_sha truthful. All recorded implementation, stop-report, checkpoint, phase-closeout, and final closeout commit IDs in reports, memory docs, and automation files must be full 40-character SHAs that resolve with live git to the intended commit; repair short, ambiguous, stale, or mismatched docs-only commit references inline before claiming memory and git are up to date. If docs, reports, archive, memory, or automation closeout commits advance HEAD after accepted runtime code, keep implementation_commit_sha attached to the accepted runtime implementation and identify the docs/automation closeout commit separately as stop_report_commit_sha or final closeout HEAD. If the repo uses V3A automation, verify that automation/state.json and automation/qa.json agree with the current phase, QA outcome, and next authorized execution window, keep the compatibility `worktree` field null, and update them when QA clears, blocks, revises, or replans the phase. If the only blocking findings are brief-local or reports-only drift that you can verify directly, repair them inline in the same run, commit and push the repair if tracked files changed, keep implementation_commit_sha attached to the accepted implementation, and use any QA-authored repair commit as the new stop_report_commit_sha. Default git closeout is commit and push on the active branch only; do not ask about direct-merge versus PR flow and do not merge to main or open/update a PR unless the user explicitly asked for that. Whenever you return a worker handoff after phase clearance, revision-pack delivery, or replan delivery, include the full paste-ready prompt inline in the response body, preferably in a fenced text block; do not replace it with only remote paths or filenames. Worker handoffs must use the compact shared shape: Target, Read for context, Execute now, Quality bar, Validation, Stop report. Worker handoffs should not mention or invoke $forge-bootstrap by name for normal phase execution; use FULL_REHYDRATE, BRIEF_REHYDRATE, or HOT_RESUME plus the exact files to read. If an intermediate QA_CHECKPOINT clears and later phases remain, update the brief status, automation/*.json state, and return the next authorized worker handoff prompt automatically. If the final shipgate clears, execute and verify the required memory-pack updates, archive the accepted brief from active to completed, reconcile updated memory docs, final reports, reports/LATEST.*, automation/*.json, current branch, and HEAD so all recorded commit IDs are full, resolvable, and attached to the correct meaning, verify the archived brief path, and return one verified terminal closeout summary automatically before emitting CLEAR_CURRENT_PHASE. If QA still fails because implementation-owned code, tests, runtime behavior, or worker-owned tracked files must change, author the next revision pack or replan yourself, deliver it via SCP, verify the remote files, update automation/*.json to the newly authorized phase, and return the next handoff prompt automatically.
