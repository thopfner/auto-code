interface:
  display_name: "FORGE Scope"
  short_description: "Repo-grounded intent interview before planning"
  default_prompt: >-
    Use $forge-scope. Run this only after $forge-bootstrap has already established the repo context for the current session. Do not perform bootstrap or full repo rehydration from this skill. Start from the active repo context or my VPS repo, inspect only the request-relevant code and memory surfaces, then run a serious but bounded interview to identify my true intent, goals, non-goals, quality bar, and tradeoffs before any implementation planning begins. This is an interview-style scoping workflow, not an execution planner. Treat the active repo path as the only allowed filesystem root: if I ask for a new branch or worktree, interpret that as a GitHub branch request only, do not create `git worktree` directories or duplicate repo folders, and keep all scope artifacts inside the active repo path under `docs/exec-plans/scope/`. Keep scope artifacts untracked so they do not create git or repo-hygiene complaints; prefer repo-local exclusion such as `.git/info/exclude` rather than tracked `.gitignore` changes when exclusion needs to be established. Assume bootstrap already confirmed the repo path, branch, HEAD, dirty state, and baseline memory context. If that bootstrap context is missing or unreliable, stop and tell me to run $forge-bootstrap first rather than recreating it here. Form a first-pass hypothesis about my likely primary goal, secondary goals, pain points, and risk areas from the already-bootstrapped repo context plus the request-relevant code surfaces. Choose the lightest truthful scope mode after inspection: use lite mode when one dominant goal is already visible and ambiguity is limited to boundaries, priorities, or success criteria; use full mode when the real goal is unclear, the request mixes feature work with cleanup or refactor pressure, quality posture matters materially, or multiple interview rounds are needed to avoid a weak plan. If the task touches user-facing UI, dashboards, forms, tables, onboarding, settings, navigation, editors, page flows, layout, density, hierarchy, interaction states, or responsive behavior, activate UI intent mode. In UI intent mode, be more inquisitive: ask 3-5 focused questions per round when UX direction is unclear, ask at least one UX-direction question unless I already provided an explicit target, and ask at least one anti-goal question about what would make the result feel wrong. Do not optimize primarily for fewer questions on UI work; optimize for making the intended UX direction explicit enough for $forge-plan. Use dedicated UI skills separately when I explicitly want formal UI polish or UI review. In UI intent mode, clarify UX direction, reference surfaces, hierarchy, density, layout model, component reuse, interaction states, responsive expectations, and UX anti-goals. Do not begin with broad open-ended questions if a stronger repo-grounded hypothesis can be presented for confirmation. Restate your current understanding before questioning, including what the request appears to be, what outcome I likely care about, and what still seems ambiguous. For non-UI work, ask only the highest-value follow-up questions, normally at most 1-3 per round. Prefer hypothesis-confirming questions over blank-slate prompts. If an ambiguity is minor, proceed with a labeled assumption instead of blocking. In lite mode, prefer a single round and stop as soon as planning-quality clarity is sufficient. In full mode, keep each round hypothesis-driven and stop once the primary goal, desired outcome, non-goals, quality posture, and priorities are clear enough for planning. For UI work, do not stop until UX direction, hierarchy, density, states, and responsive expectations are explicit enough for planning. Explicitly test whether the real need is a minimal patch, clean refactor, staged cleanup plus feature, best-practice redesign, narrow performance-focused rewrite, or UX correction with minimal backend churn. Always make the production-grade quality bar explicit: any future implementation plan must be grounded in industry-standard production engineering norms, the repo's established architecture and conventions, and current official documentation or primary sources for the affected framework, library, platform, API, or provider when guidance may be version-sensitive or high-risk. This applies to backend, APIs, Python, frontend, data, infrastructure, tests, security, reliability, accessibility, performance, and operational behavior. If my desired outcome conflicts with production-grade or stack-specific best practice, surface the conflict and capture the approved tradeoff explicitly. When useful, rank priorities such as correctness, maintainability, performance, UX quality, speed to ship, minimal churn, architectural cleanliness, and operational simplicity. Make success criteria, anti-goals, acceptable tradeoffs, unacceptable tradeoffs, and what must not break explicit before closing the interview. If prior implementation quality appears to be part of the real problem, say so plainly and test whether I want cleanup included or excluded from scope. Do not drift into architecture selection or execution-phase design unless it is necessary to surface a user-level tradeoff. Once intent confidence is high enough, produce and save a canonical scope package under `docs/exec-plans/scope/<scope-id>/`. In lite mode, save `README.md`, `scope-brief.md`, and `forge-plan-handoff.md`. In full mode, save `README.md`, `00-codebase-framing.md`, `01-intent-interview.md`, `02-goals-tradeoffs-and-non-goals.md`, `03-scope-brief.md`, and `04-forge-plan-handoff.md`. The canonical scope brief must capture the interpreted primary goal, secondary goals, why now, problem statement, desired outcome, in-scope items, out-of-scope items, quality posture, production-grade quality bar, industry best-practice requirements, technology documentation requirements, security/reliability/performance expectations, UI intent mode when applicable, ux_direction, reference surfaces, target user journey, primary action, information hierarchy, UI density, layout model, component reuse expectations, interaction states, responsive expectations, ux_anti_goals, priority order, must-preserve rules, acceptable and unacceptable tradeoffs, implicated repo surfaces, user-stated constraints, inferred constraints, success criteria, failure modes to avoid, open questions, approved assumptions, recommended planning mode, and notes for forge-plan. After saving the scope package, return a concise scoping summary, the mode used, your confidence level, the canonical scope brief path, the saved scope folder path, and a full paste-ready prompt for $forge-plan. That handoff prompt must tell forge-plan to treat the scope brief as the authoritative statement of user intent, validate it against the live repo, ask only planning-specific follow-up questions if technical ambiguity still blocks a high-quality plan, preserve the stated goals, non-goals, quality posture, production-grade best-practice requirements, UI intent, UX direction, and priorities, ground every implementation recommendation in production-grade industry norms and the best practices of the affected technology stack, consult current official documentation or primary sources when framework, library, provider, security, performance, accessibility, or API guidance may be version-sensitive or high-risk, and generate the best-fit, highest-quality repo-grounded plan rather than merely the shortest implementation path. If the active repo is dirty and repo memory does not already define the topology rule, stop and ask before changing the target branch or repo path.
