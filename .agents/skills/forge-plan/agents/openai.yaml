interface:
  display_name: "FORGE Plan"
  short_description: "Scope, research, and agree on execution"
  default_prompt: >-
    Use $auto-forge-plan. From Codex Local, SSH to my VPS repo, inspect the live code and repo memory, help me plan this feature interactively, then deliver the approved execution pack to docs/exec-plans/active and return the handoff prompt for my VPS coding agent. If I provide a saved scope brief or `forge-plan-handoff.md` from `docs/exec-plans/scope/`, treat it as the authoritative intent input, validate it against the live repo, and do not rediscover my goals from scratch. If I do not provide one, work directly from my request as usual. Treat the active VPS repo path as the only allowed filesystem root: if I ask for a new branch or worktree, interpret that as a GitHub branch request only, do not create `git worktree` directories or duplicate repo folders, and keep all planning files inside the active repo path. Scope planned code changes with confidence: name exact files only when repo inspection makes them genuinely clear; otherwise name concrete modules or surfaces and clearly label likely file candidates as likely instead of fixed. Every execution pack must include a Production-grade acceptance bar grounded in repo conventions, official or primary sources when guidance is version-sensitive or high-risk, or an explicit user-approved tradeoff. Keep low-risk phases lean, but when a phase touches risky seams such as schema, auth, provider contracts, sendability ordering, derived state, or stateful UI flows, add the explicit seam inventory, drift-path coverage, and checkpoint-usability contract. Every new pack must also scaffold machine-readable stop artifacts: initialize reports/LATEST.json, and when the repo already uses automation metadata or repeated QA cycles are expected, scaffold automation/state.json and automation/qa.json too. In V3A repos, automation/state.json must declare the current authorized phase, execution status, read mode, validation level, owned paths, explicitly allowed runtime commands, and target GitHub branch; keep the compatibility `worktree` field null so Claude hooks do not infer an alternate checkout. Validation levels must be operationally truthful because repo-local Claude hooks may enforce them at Bash-tool time; in image-baked frontend or backend services, a service-scoped docker compose build, up --build, or recreate command can still be SERVICE_RESTART when it is limited to the directly affected service and named explicitly in allowed_commands. Reserve FULL_REBUILD for stack-wide or multi-service rebuilds, or real runtime-boundary changes. Keep worker handoffs lean and use the compact shared shape: Target, Read for context, Execute now, Quality bar, Validation, Stop report. Use the lightest truthful read mode, default same-brief continuation to the active brief, current authorized phase file(s), reports/LATEST.md, reports/LATEST.json when present, and automation/state.json when present, and only pull broader context when branch, active repo target, brief lineage, topology, or durable constraints changed materially. Worker handoffs should not mention or invoke $auto-forge-bootstrap by name for normal phase execution; use FULL_REHYDRATE, BRIEF_REHYDRATE, or HOT_RESUME plus the exact files to read. If the active target is dirty and repo memory does not already define the topology rule, stop and ask before changing the target branch or repo path.
